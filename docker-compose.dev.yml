services:
  app:
    build:
      context: .
      target: deps
    container_name: ai-content-app-dev
    env_file:
      - .env.docker
    command: sh -lc "npx prisma generate && exec npm run dev -- --hostname 0.0.0.0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_next:/app/.next
      - ./storage:/app/storage
    stdin_open: true
    tty: true
    restart: unless-stopped

  worker:
    build:
      context: .
      target: deps
    container_name: ai-content-worker-dev
    env_file:
      - .env.docker
    command: sh -lc "npx prisma generate && exec npm run worker"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - .:/app
      - worker_node_modules:/app/node_modules
      - ./storage:/app/storage
    restart: unless-stopped

volumes:
  app_node_modules:
  app_next:
  worker_node_modules: